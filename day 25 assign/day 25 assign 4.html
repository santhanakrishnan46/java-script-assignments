<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Car {
  constructor(brand, model) {
    this.brand = brand;
    this.model = model;
    this.isAvailable = true;
  }

  rentCar() {
    if (this.isAvailable) {
      this.isAvailable = false;
      console.log(`${this.brand} ${this.model} has been rented.`);
    } else {
      console.log(`${this.brand} ${this.model} is not available.`);
    }
  }

  returnCar() {
    this.isAvailable = true;
    console.log(`${this.brand} ${this.model} has been returned.`);
  }
}

// Create car objects
const car1 = new Car("Toyota", "Corolla");
const car2 = new Car("Honda", "Civic");

// Test renting and returning
car1.rentCar();
car1.rentCar(); // try renting again
car1.returnCar();

car2.rentCar();
car2.returnCar();

    </script>
</body>
</html>
