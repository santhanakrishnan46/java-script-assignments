<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Animal {
  constructor(name) {
    this.name = name;
  }

  speak() {
    console.log("The animal makes a sound.");
  }
}

class Dog extends Animal {
  speak() {
    console.log(this.name + " says: Woof!");
  }
}

// Create object
const myDog = new Dog("Buddy");

// Call method
myDog.speak();

    </script>
</body>
</html>
